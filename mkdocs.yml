site_name: SuperModelingFactory
site_description: 面向信用评分卡开发的端到端建模工具链 — 样本管理、WOE 编码、特征筛选、模型训练、性能评估、Excel 报告一键生成。
site_author: Jingkai Sun
site_url: https://kyle-j-sun.github.io/SuperModelingFactory_doc/

docs_dir: docs
site_dir: site

# ----------------------------------------------------------------------------
# 主题 — Material Design
# ----------------------------------------------------------------------------
theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - palette.toggle
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  icon:
    repo: fontawesome/brands/git-alt

# ----------------------------------------------------------------------------
# 仓库 / 源码
# ----------------------------------------------------------------------------
repo_url: https://github.com/Kyle-J-Sun/SuperModelingFactory
edit_uri: edit/main/docs/

# ----------------------------------------------------------------------------
# Markdown 扩展
# ----------------------------------------------------------------------------
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# ----------------------------------------------------------------------------
# 插件
# ----------------------------------------------------------------------------
plugins:
  - search
  - autorefs
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [../SuperModelingFactory]
          options:
            docstring_style: numpy
            show_if_no_docstring: false
            inherited_members: false
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: false
            docstring_section_style: table
            filters: ["!^_"]
          load_external_modules: false

