name: Deploy documentation to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out documentation
        uses: actions/checkout@v5
        with:
          path: SuperModelingFactory_doc

      - name: Check out source code
        uses: actions/checkout@v5
        with:
          repository: Kyle-J-Sun/SuperModelingFactory
          path: SuperModelingFactory

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            SuperModelingFactory_doc/requirements-docs.txt
            SuperModelingFactory/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r SuperModelingFactory/requirements.txt
          python -m pip install -r SuperModelingFactory_doc/requirements-docs.txt

      - name: Build site
        working-directory: SuperModelingFactory_doc
        run: mkdocs build --clean

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          token: ${{ github.token }}
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: SuperModelingFactory_doc/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        # GitHub Pages deployments occasionally fail with a transient
        # "Deployment failed, try again later." from the Pages service
        # (observed 2026-07-06 on the ChangeLog merge). Retry twice
        # with a short backoff so a single transient blip does not leave
        # the site out of sync with main.
        with:
          timeout: 600000
          error_count: 10
          reporting_interval: 5000

      - name: Retry deploy on transient failure
        if: failure() && steps.deployment.conclusion == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
