name: Deploy documentation to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out documentation
        uses: actions/checkout@v4
        with:
          path: SuperModelingFactory_doc

      - name: Check out source code
        uses: actions/checkout@v4
        with:
          repository: Kyle-J-Sun/SuperModelingFactory
          path: SuperModelingFactory

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            SuperModelingFactory_doc/requirements-docs.txt
            SuperModelingFactory/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r SuperModelingFactory/requirements.txt
          python -m pip install -r SuperModelingFactory_doc/requirements-docs.txt

      - name: Build site
        working-directory: SuperModelingFactory_doc
        run: mkdocs build --clean

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          token: ${{ github.token }}
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: SuperModelingFactory_doc/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
